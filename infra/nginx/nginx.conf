# Reverse proxy nginx davanti al backend Hemora.
# Inoltra il traffico verso il container del backend sulla rete Docker condivisa.

upstream hemora_backend {
    # "backend" e il nome del servizio in docker-compose: risolto via DNS interno.
    server backend:4000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Healthcheck del proxy stesso (non inoltrato al backend).
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        proxy_pass http://hemora_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }
}
